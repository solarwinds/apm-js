name: Scan packages
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      RLPORTAL_ACCESS_TOKEN:
        required: true

permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      RLPORTAL_ACCESS_TOKEN: ${{ secrets.RLPORTAL_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v6
        with:
          cache: false

      - run: pnpm install
      - run: pnpm run scan
